<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 120px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #e74c3c;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #333;
        }

        .btn {
            margin-top: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #e74c3c;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 45%;
            margin-right: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #c0392b;
        }

        a {
            display: inline-block;
            padding: 10px 15px;
            background: #ccc;
            color: #333;
            border-radius: 8px;
            text-decoration: none;
            width: 45%;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>⚠️ Delete Task</h2>

    <p>Are you sure you want to delete?</p>
    <p><b>{{ task.title }}</b></p>

    <form method="POST">
        {% csrf_token %}

        <div class="btn-container">
            <button type="submit">Yes Delete</button>
            <a href="/">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
