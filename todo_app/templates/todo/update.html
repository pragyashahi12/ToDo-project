<!DOCTYPE html>
<html>
<head>
    <title>Update Task</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #6c63ff;
        }

        .checkbox {
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #6c63ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #5548d9;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>✏️ Update Task</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" value="{{ task.title }}">

        <div class="checkbox">
            <label>
                <input type="checkbox" name="completed"
                {% if task.completed %}checked{% endif %}>
                Completed
            </label>
        </div>

        <button type="submit">Update Task</button>
    </form>

    <a href="/">← Back to Home</a>
</div>

</body>
</html>
